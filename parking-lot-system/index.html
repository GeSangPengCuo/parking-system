<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>停车场管理系统 - 网页版</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">
    <header class="app-header">
        <h1>停车场管理系统（网页版）</h1>
        <p>基于 HTML + CSS + JavaScript 的可视化界面</p>
    </header>

    <section class="card" id="init-section">
        <h2>1. 初始化停车场</h2>
        <div class="form-row">
            <label for="capacity-input">车位总数</label>
            <input type="number" id="capacity-input" min="1" max="10000" placeholder="例如：10" />
        </div>
        <div class="form-row">
            <label for="price-input">每小时收费金额（元）</label>
            <input type="number" id="price-input" min="0" step="0.1" placeholder="例如：5.0" />
        </div>
        <button id="init-btn" class="btn primary">初始化</button>
        <p class="hint">初始化之后即可进行车辆入场、离场、查询等操作。</p>
    </section>

    <section class="grid">
        <section class="card">
            <h2>2. 车辆入场</h2>
            <div class="form-row">
                <label for="enter-plate-input">车牌号</label>
                <input type="text" id="enter-plate-input" placeholder="例如：粤A12345" />
            </div>
            <div class="form-row">
                <label for="enter-color-input">车辆颜色</label>
                <input type="text" id="enter-color-input" placeholder="例如：白色" />
            </div>
            <button id="enter-btn" class="btn success">入场停车</button>
        </section>

        <section class="card">
            <h2>3. 车辆离场并结算</h2>
            <div class="form-row">
                <label for="leave-plate-input">车牌号</label>
                <input type="text" id="leave-plate-input" placeholder="要离场的车牌号" />
            </div>
            <button id="leave-btn" class="btn danger">离场并计算费用</button>
        </section>

        <section class="card">
            <h2>4. 按车牌号查询</h2>
            <div class="form-row">
                <label for="search-plate-input">车牌号</label>
                <input type="text" id="search-plate-input" placeholder="要查询的车牌号" />
            </div>
            <button id="search-btn" class="btn">查询车位</button>
        </section>
    </section>

    <section class="card">
        <h2>5. 停车场状态</h2>
        <div id="status-summary" class="status-summary">
            尚未初始化停车场。
        </div>
        <div class="table-wrapper">
            <table id="status-table">
                <thead>
                <tr>
                    <th>车位号</th>
                    <th>状态</th>
                    <th>车牌号</th>
                    <th>颜色</th>
                    <th>入场时间</th>
                    <th>已停时长</th>
                </tr>
                </thead>
                <tbody>
                <!-- 由 JavaScript 动态填充 -->
                </tbody>
            </table>
        </div>
    </section>

    <section class="card">
        <h2>系统消息</h2>
        <div id="messages" class="messages"></div>
    </section>
</div>

<script src="app.js"></script>
</body>
</html>
